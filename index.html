 <!DOCTYPE html>
<html lang="en">
<head>
      <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <link rel="stylesheet" href="styles.css">
<title>TWEE</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
    body {
  font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;

}
</style>
</head>
<body>

 <div class="header">
  <h1>Twee Dress Up</h1>
  <p>Figure out the perfect outfit!</p>
</div> 

<div class="navbar">
  <a href="#">Dress Up</a>
  <a href="#">History</a>
  <a href="#">How To Dress Twee</a>
  <a href="#" class="right">About Me</a>
</div>



<div class="row">
  <div class="main">CLICK ON THE CLOTHING TO MAKE AN OUTFIT!</div>

</div>
<div class="game-container">
        <div class="doll-area" id="dollArea">
            <!-- Character base image goes here -->
            <img src="images/doll-base.png" alt="Character Base" class="doll-base">
            <a-scene>
      <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box>
      <a-sphere position="0 1.25 -5" radius="1.25" color="#EF2D5E"></a-sphere>
      <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
      <a-sky color="#ECECEC"></a-sky>
    </a-scene>
          </div>
        <div class="wardrobe" id="wardrobe">
            <!-- Clothing items will be placed here -->
            <img src="images/dress1.png" alt="Dress 1" class="clothing-item" draggable="true" data-type="dress">
            <img src="images/hat1.png" alt="Hat 1" class="clothing-item" draggable="true" data-type="hat">
            <!-- Add more clothing items -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
