 <!DOCTYPE html>
<html lang="en">
<head>
   <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
   <script src="https://unpkg.com/aframe-orbit-controls@1.3.2/dist/aframe-orbit-controls.min.js"></script>
   <link rel="stylesheet" href="styles.css">
<title>TWEE</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
    body {
  font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;

}
</style>
</head>
<body>

 <div class="header">
  <h1>Twee Dress Up</h1>
  <p>Figure out the perfect outfit!</p>
</div> 

<div class="navbar">
  <a href="#">Dress Up</a>
  <a href="#">History</a>
  <a href="#">How To Dress Twee</a>
  <a href="#" class="right">About Me</a>
</div>

<div class="row">
  <div class="main">CLICK ON THE CLOTHING TO MAKE AN OUTFIT!</div>
</div>
<div class="game-container">
        <div class="doll-area" id="dollArea">
          <!-- The A-Frame scene will be embedded here-->
          <a-scene id="scene" embedded>
            <a-assets>
                <a-asset-item id="girl" src="girl.glb"></a-asset-item>
                <a-asset-item id="jeans" src="jeans.glb"></a-asset-item>
                <a-asset-item id="stripedshirt" src="stripedshirt.glb"></a-asset-item>
                <a-asset-item id="blueshoes" src="blueshoes.glb"></a-asset-item>
                <a-asset-item id="plaidskirt" src="plaidskirt.glb"></a-asset-item>
                <a-asset-item id="plaidtop" src="plaidtop.glb"></a-asset-item>
                <a-asset-item id="beigeshoes" src="beigeshoes.glb"></a-asset-item>
                <a-asset-item id="tanktop" src="tanktop.glb"></a-asset-item>
                <a-asset-item id="longskirt" src="longskirt.glb"></a-asset-item>
                <a-asset-item id="whiteshoes" src="whiteshoes.glb"></a-asset-item>
              </a-assets>
            <a-entity gltf-model="#girl" position="0 2.5 -4" rotation="0 -90 0" scale="0.5 0.5 0.5" modify-materials></a-entity>
            <a-entity gltf-model="#jeans" position="0 2.5 -4" rotation="0 -90 0" scale="0.5 0.5 0.5" modify-materials visible="false"></a-entity>
            <a-entity gltf-model="#stripedshirt" position="0 2.5 -4" rotation="0 -90 0" scale="0.5 0.5 0.5" modify-materials visible="false"></a-entity>
            <a-entity gltf-model="#plaidskirt" position="0 2.5 -4" rotation="0 -90 0" scale="0.5 0.5 0.5" modify-materials visible="false"></a-entity>
            <a-entity gltf-model="#plaidtop" position="0 2.5 -4" rotation="0 -90 0" scale="0.5 0.5 0.5" modify-materials visible="false"></a-entity>
            <a-entity gltf-model="#beigeshoes" position="0 2.5 -4" rotation="0 -90 0" scale="0.5 0.5 0.5" modify-materials visible="false"></a-entity>
            <a-entity gltf-model="#tanktop" position="0 2.5 -4" rotation="0 -90 0" scale="0.5 0.5 0.5" modify-materials visible="false"></a-entity>
            <a-entity gltf-model="#longskirt" position="0 2.5 -4" rotation="0 -90 0" scale="0.5 0.5 0.5" modify-materials visible="false"></a-entity>
            <a-entity gltf-model="#whiteshoes" position="0 2.5 -4" rotation="0 -90 0" scale="0.5 0.5 0.5" modify-materials visible="false"></a-entity>
            <a-entity camera look-controls="enabled: false" orbit-controls="target: 0 2 -4; minDistance: 4; maxDistance: 5; initialPosition: 0 3 5; rotateSpeed: 0.5"></a-entity>
      </a-scene>

            <div class="wardrobe" id="wardrobe">
            <!-- Clothing items will be placed here -->
          
            <div class="container">
  <div>Tops</div>
  <div>Bottoms</div>
  <div>Shoes</div>
  <div><img src="striped shirt.png" alt="Striped Shirt" class="clothing-item"visible="true" data-type="shirt"></div>
  <div><img src="jeans.png" alt="Hat 1" class="clothing-item" draggable="true" data-type="hat"></div>
  <div><img src="Blueshoes.png" alt="Hat 1" class="clothing-item" draggable="true" data-type="hat"></div>
  <div>4</div>
  <div>5</div>
</div>
    </div>
    <script src="script.js"></script>



  
<script type="module" src="script.js"></script>

</body>
</html>
