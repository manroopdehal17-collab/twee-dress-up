 <!DOCTYPE html>
<html lang="en">
<head>
   <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
   <script src="https://unpkg.com/aframe-orbit-controls@1.3.2/dist/aframe-orbit-controls.min.js"></script>
   <link rel="stylesheet" href="styles.css">
   <script src="script.js"></script>
<title>TWEE</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
    body {
  font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
    }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

</style>    
</head>
<body onload="loadbody()" style="margin:0;" id="myDiv">
  <div id="loader"></div>
 <div class="header">
  <h1>Twee Dress Up</h1>
  <p>Figure out the perfect outfit!</p>
</div> 

<div class="navbar">
  <a href="#">Dress Up</a>
  <a href="#">History</a>
  <a href="#">How To Dress Twee</a>
  <a href="#" class="right">About Me</a>
</div>

<div class="row">
  <div class="main">CLICK ON THE CLOTHING TO MAKE AN OUTFIT!</div>
</div>
<div class="game-container">
  <div class="doll-area" id="dollArea">
    <a-scene id="scene" embedded>
    <a-assets>
      <a-asset-item 
        id="girl-model" 
        src="girl.glb">  
      </a-asset-item>
      <a-asset-item 
        id="jean-model" 
        src="jeans.glb">
      </a-asset-item>
      <a-asset-item 
        id="stripedshirt-model" 
        src="stripedshirt.glb">
      </a-asset-item>
      <a-asset-item 
        id="blueshoes-model" 
        src="blueshoes.glb">
      </a-asset-item>
      <a-asset-item 
        id="plaidskirt-model" 
        src="plaidskirt.glb">
      </a-asset-item>
      <a-asset-item 
        id="plaidtop-model" 
        src="plaidtop.glb">
      </a-asset-item>
      <a-asset-item  
        id="beigeshoes-model" 
        src="beigeshoes.glb">
      </a-asset-item>
      <a-asset-item 
        id="tanktop-model" 
        src="tanktop.glb">
      </a-asset-item>
      <a-asset-item 
        id="longskirt-model" 
        src="longskirt.glb">
      </a-asset-item>
      <a-asset-item 
        id="whiteshoes-model" 
        src="whiteshoes.glb">
      </a-asset-item>
    </a-assets>
        <a-entity  
          gltf-model="#girl-model" 
          position="0 2.5 -4" 
          rotation="0 -90 0" 
          scale="0.5 0.5 0.5" 
          modify-materials>
        </a-entity>
        <a-entity 
          id="stripedshirt" 
          gltf-model="#stripedshirt-model" 
          position="0 2.5 -4" 
          rotation="0 -90 0" 
          scale="0.5 0.5 0.5" 
          visible="false">
        </a-entity>
        <a-entity  
          id="jeans" 
          gltf-model="#jean-model" 
          position="0 2.5 -4" 
          rotation="0 -90 0" 
          scale="0.5 0.5 0.5" 
          modify-materials visible="false">
        </a-entity>
        <a-entity 
          id="blueshoes" 
          gltf-model="#blueshoes-model" 
          position="0 2.5 -4" 
          rotation="0 -90 0" 
          scale="0.5 0.5 0.5" 
          modify-materials visible="false">
        </a-entity>
        <a-entity  
          id="plaidskirt" 
          gltf-model="#plaidskirt-model" 
          position="0 2.5 -4" 
          rotation="0 -90 0" 
          scale="0.5 0.5 0.5" 
          modify-materials visible="false">
        </a-entity>
        <a-entity 
          id="plaidtop" 
          gltf-model="#plaidtop-model" 
          position="0 2.5 -4" 
          rotation="0 -90 0" 
          scale="0.5 0.5 0.5" 
          modify-materials visible="false">
        </a-entity>
        <a-entity 
          id="beigeshoes" 
          gltf-model="#beigeshoes-model" 
          position="0 2.5 -4" 
          rotation="0 -90 0" 
          scale="0.5 0.5 0.5" 
          modify-materials visible="false">
        </a-entity>
        <a-entity 
          id="tanktop" 
          gltf-model="#tanktop-model" 
          position="0 2.5 -4" 
          rotation="0 -90 0" 
          scale="0.5 0.5 0.5" 
          modify-materials visible="false">
        </a-entity>
        <a-entity 
          id="longskirt" 
          gltf-model="#longskirt-model" 
          position="0 2.5 -4" 
          rotation="0 -90 0" 
          scale="0.5 0.5 0.5" 
          modify-materials visible="false">
        </a-entity>
        <a-entity 
          id="whiteshoes" 
          gltf-model="#whiteshoes-model" 
          position="0 2.5 -4" 
          rotation="0 -90 0" 
          scale="0.5 0.5 0.5" 
          modify-materials visible="false">
        </a-entity>
        <a-entity 
          camera look-controls="enabled: false" 
          orbit-controls="target: 0 2 -4; minDistance: 4; maxDistance: 5; initialPosition: 0 3 5; rotateSpeed: 0.5">
        </a-entity>
      </a-scene>
    </div>

<div class="reset-container">
    <button onclick="resetclothes()" 
    class="resetButton"
    id="resetButton">Reset Outfit
  </button>
</div>

<div class="container">
    <button class="title">Tops</button>
    <button class="title">Bottoms</button>
    <button class="title">Shoes</button>
    <button onclick="showstripedshirt()" class="clothes">
      <img id="stripedshirtButton" 
      src="stripedshirt.png" 
      alt="Striped Shirt" 
      class="clothing-item" 
      data-type="tops" 
      data-model="stripedshirt">
    </button>
    <button onclick="showjeans()" class="clothes">
      <img src="jeans.png"
       alt="jeans" 
       class="clothing-item" 
       data-type="bottoms" 
       data-model="jeans">
    </button>
    <button onclick="showblueshoes()" class="clothes">
      <img src="Blueshoes.png" 
      alt="blueshoes" 
      class="clothing-item" 
      data-type="shoes" 
      data-model="blueshoes">
    </button>
    <button onclick="showplaidtop()" class="clothes">
      <img src="plaidtop.png" 
      alt="plaidtop" 
      class="clothing-item" 
      data-type="tops" 
      data-model="plaidtop">
    </button>
    <button onclick="showplaidskirt()" class="clothes">
      <img src="plaidskirt.png" 
      alt="plaidskirt" 
      class="clothing-item" 
      data-type="bottoms" 
      data-model="plaidskirt">
    </button>
    <button onclick="showbeigeshoes()" class="clothes">
      <img src="beigeshoes.png" 
      alt="beigeshoes" 
      class="clothing-item" 
      data-type="shoes" 
      data-model="beigeshoes">
    </button>
    <button onclick="showtanktop()" class="clothes">
      <img src="tanktop.png" 
      alt="tanktop" 
      class="clothing-item" 
      data-type="tops" 
      data-model="tanktop">
    </button>
    <button onclick="showlongskirt()" class="clothes">
      <img src="longskirt.png" 
      alt="longskirt" 
      class="clothing-item" 
      data-type="bottoms" 
      data-model="longskirt">
    </button>
    <button onclick="showwhiteshoes()" class="clothes">
      <img src="whiteshoes.png" 
      alt="whiteshoes" 
      class="clothing-item" 
      data-type="shoes" 
      data-model="whiteshoes">
    </button>
</div>

</body>
</html>
