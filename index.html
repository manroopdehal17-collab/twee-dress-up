<script>
  AFRAME.registerComponent('modify-materials', {
    init: function () {
      // Wait for model to load.
      this.el.addEventListener('model-loaded', () => {
        // Grab the mesh / scene.
        const obj = this.el.getObject3D('mesh');
        // Go over the submeshes and modify materials we want.
        obj.traverse(node => {
          if (node.name.indexOf('ship') !== -1) {
            node.material.color.set('red');
          }
        });
      });
    }
  });
</script>

<a-scene>
  <a-assets>
    <a-asset-item id="myModel" src="MODEL.gltf"></a-asset-item>
  </a-assets>
  <a-entity gltf-model="#myModel" modify-materials></a-entity>
</a-scene>

<a-entity gltf-model="#myModel" scale="0.01 0.01 0.01"></a-entity>

</div>
<div class="game-container">

    <script src="script.js"></script>


<style>
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  
    @keyframes spin2 {
      0% {
        stroke-dasharray: 1, 800;
        stroke-dashoffset: 0;
      }
      50% {
        stroke-dasharray: 400, 400;
        stroke-dashoffset: -200px;
      }
      100% {
        stroke-dasharray: 800, 1;
        stroke-dashoffset: -800px;
      }
    }
  
    .spin2 {
      transform-origin: center;
      animation: spin2 6.2s ease-in-out infinite,
        spin 6s linear infinite;
      animation-direction: alternate;
    }
  </style>
        
  <svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
    <circle class="spin2" cx="400" cy="400" fill="none"
      r="102" stroke-width="35" stroke="#709a7a"
      stroke-dasharray="641 1400"
      stroke-linecap="round" />
